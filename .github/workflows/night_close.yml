name: Daily Challenge - Night Close (11PM IST)
on:
  schedule:
    - cron: '30 17 * * *'  # 11:00 PM IST (UTC 17:30)
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Close All Content
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: node scripts/daily_challenge/engine.js close
