<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Nanban - Course Selection</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Tamil:wght@400;700&family=Baloo+Thambi+2:wght@800&display=swap">
    <style>
        /* --- BRAND HEADER --- */
        .header-standard {
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #1e3a8a;
            border-bottom: 1px solid #1e3a8a;
        }
        .brand-container {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer;
            text-decoration: none;
        }
        .brand-main {
            font-family: 'Baloo Thambi 2', cursive;
            font-size: 2.1rem;
            font-weight: 800;
            color: #002d5b;
            line-height: 0.9;
            margin: 0;
        }
        .brand-sub {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 800;
            color: #002d5b;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        :root {
            --primary: #1e3a8a;
            --bg-light: #f3f6ff;
            --card-bg: #ffffff;
            --text-dark: #334155;
            --text-dim: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans Tamil', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .hero-section {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            margin-top: 20px;
        }

        .section-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e3a8a;
            margin: 20px 0 30px;
        }

        /* --- Subject List Layout --- */
        .subject-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .subject-card {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            border-radius: 18px;
            padding: 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);
            border: none;
            transition: all 0.3s ease;
            color: white;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(30, 58, 138, 0.3);
        }

        .subject-card:active {
            transform: scale(0.97);
        }

        .icon-wrapper {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-right: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            backdrop-filter: blur(5px);
        }

        .subject-info {
            flex-grow: 1;
            font-weight: 800;
            font-size: 1.3rem;
            text-align: left;
            line-height: 1.4;
        }

        .chevron {
            color: rgba(255,255,255,0.7);
            font-size: 1.5rem;
            font-weight: 800;
        }

        /* --- Bottom Nav --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 700;
            gap: 4px;
        }

        .nav-item.active { color: #1e3a8a; }
        .nav-icon { font-size: 1.4rem; }
    </style>
</head>
<body>

    <header class="header-standard">
        <a href="index.html" class="brand-container">
            <div class="brand-main">தமிழ் நண்பன்</div>
            <div class="brand-sub">COACHING CENTER</div>
        </a>
    </header>

    <main class="hero-section">
        
        <h2 class="section-title">உங்கள் பாடத்திட்டத்தை (Course) தேர்ந்தெடுக்கவும்</h2>

        <div class="subject-list">
            <a href="index.html" class="subject-card">
                <div class="icon-wrapper">🎓</div>
                <div class="subject-info">தாள் 1 - ஆசிரியர் சிறப்புத் தகுதித் தேர்வு</div>
                <div class="chevron">❯</div>
            </a>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="course.html" class="nav-item active">
            <span class="nav-icon">📚</span>
            <span>Course</span>
        </a>
        <a href="tel:6369371452" class="nav-item">
            <span class="nav-icon">📞</span>
            <span>Contact</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">💳</span>
            <span>Pay</span>
        </a>
        <a href="#" onclick="window.logout(); return false;" class="nav-item logout">
            <span class="nav-icon">🚪</span>
            <span>Logout</span>
        </a>
    </nav>
    <script type="module">
        import { checkAuth } from './js/auth.js';
        checkAuth();
        window.logout = () => {
            sessionStorage.removeItem('A1_COACHING_PAPER_1_SESSION_FINAL_2026');
            window.location.href = 'login.html';
        };
    </script>
</body>
</html>
