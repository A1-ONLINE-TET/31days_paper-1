<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>தேர்வு கண்காணிப்பு - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f1e; --surface:#111827; --surface2:#1a2236; --border:#1e3a5f;
    --accent:#0ea5e9; --accent2:#f59e0b; --danger:#ef4444; --success:#22c55e;
    --text:#e2e8f0; --muted:#64748b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Noto Sans Tamil','Rajdhani',sans-serif;
    background:var(--bg);
    background-image:radial-gradient(circle at 20% 0%,rgba(14,165,233,.08),transparent 50%),radial-gradient(circle at 80% 100%,rgba(245,158,11,.06),transparent 50%);
    color:var(--text); min-height:100vh; padding:20px;
  }
  .wrap{max-width:1000px;margin:0 auto;}
  .head{text-align:center;margin-bottom:28px;}
  .head h1{font-family:'Outfit','Rajdhani',sans-serif;font-size:1.8rem;font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .head p{color:var(--muted);font-size:.95rem;margin-top:4px;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:20px;}

  .auth-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .field{flex:1;min-width:180px;}
  label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px;}
  input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;font-family:inherit;}
  input:focus{outline:none;border-color:var(--accent);}
  button{padding:12px 22px;border:none;border-radius:10px;font-family:inherit;font-weight:700;font-size:1rem;cursor:pointer;color:#fff;transition:transform .1s,opacity .2s;}
  button:hover{transform:translateY(-1px);}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#0284c7);}
  .btn-amber{background:linear-gradient(135deg,var(--accent2),#d97706);}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;}
  .stat .num{font-family:'Outfit',sans-serif;font-size:2.2rem;font-weight:800;color:var(--accent);}
  .stat .lbl{color:var(--muted);font-size:.85rem;margin-top:4px;}
  .stat.amber .num{color:var(--accent2);}
  .stat.green .num{color:var(--success);}

  table{width:100%;border-collapse:collapse;margin-top:8px;}
  th,td{padding:11px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:.92rem;}
  th{color:var(--accent);font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.5px;}
  tr:hover td{background:var(--surface2);}
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.78rem;font-weight:600;background:rgba(14,165,233,.15);color:var(--accent);}

  .msg{padding:14px;border-radius:10px;margin-top:14px;font-size:.92rem;text-align:center;display:none;}
  .msg.err{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}
  .msg.info{background:rgba(14,165,233,.1);color:#7dd3fc;border:1px solid rgba(14,165,233,.25);}
  .hidden{display:none;}
  .loading{text-align:center;color:var(--muted);padding:30px;}
  .search-box{margin:14px 0;}
  .search-box input{max-width:300px;}
  .export-row{display:flex;gap:10px;justify-content:flex-end;margin-bottom:10px;flex-wrap:wrap;}
  .btn-sm{padding:8px 16px;font-size:.88rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>📊 தேர்வு கண்காணிப்பு</h1>
    <p>தேதி வாரியாக மாணவர்கள் விவரம் — PAPER 1</p>
  </div>

  <!-- Auth + Date -->
  <div class="card" id="controlCard">
    <div class="auth-row">
      <div class="field">
        <label>Admin Key</label>
        <input type="password" id="adminKey" placeholder="Admin key உள்ளிடவும்">
      </div>
      <div class="field">
        <label>தேதி (Date)</label>
        <input type="date" id="trackDate">
      </div>
      <button class="btn-primary" id="loadBtn" onclick="loadData()">பார்க்க</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>

  <!-- Results -->
  <div id="resultArea" class="hidden">
    <div class="stats">
      <div class="stat"><div class="num" id="totalCount">0</div><div class="lbl">மொத்த மாணவர்கள்</div></div>
      <div class="stat green"><div class="num" id="passCount">0</div><div class="lbl">தேர்ச்சி (Pass)</div></div>
      <div class="stat amber"><div class="num" id="avgScore">0</div><div class="lbl">சராசரி மதிப்பெண்</div></div>
    </div>

    <div class="card">
      <div class="export-row">
        <button class="btn-amber btn-sm" onclick="exportCSV()">⬇ CSV Download</button>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 பெயர் / மொபைல் தேடு..." oninput="renderTable()">
      </div>
      <div id="tableWrap">
        <table>
          <thead>
            <tr><th>#</th><th>பெயர்</th><th>மொபைல்</th><th>சமூகம்</th><th>மதிப்பெண்</th><th>நேரம்</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="loading hidden" id="emptyMsg">இந்த தேதியில் யாரும் தேர்வு எழுதவில்லை.</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvqXvd5M9GvcLRLFNC7LXeRUWH5ldKvyY",
  authDomain: "paper-1-31.firebaseapp.com",
  databaseURL: "https://paper-1-31-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "paper-1-31",
  storageBucket: "paper-1-31.firebasestorage.app",
  messagingSenderId: "551864023812",
  appId: "1:551864023812:web:a77cef841cf8d51f5eae51"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_KEY = "A1ADMIN2025";
let allStudents = [];

// default date = today (server time)
(async () => {
  try {
    const r = await fetch('/api/now');
    const d = await r.json();
    document.getElementById('trackDate').value = d.date;
  } catch(e) {
    document.getElementById('trackDate').value = new Date().toISOString().split('T')[0];
  }
})();

function showMsg(text, type='info'){
  const m = document.getElementById('msg');
  m.textContent = text; m.className = 'msg ' + type; m.style.display = 'block';
}

window.loadData = async function(){
  const key = document.getElementById('adminKey').value.trim();
  const date = document.getElementById('trackDate').value;
  if(key !== ADMIN_KEY){ showMsg('❌ தவறான Admin Key!','err'); return; }
  if(!date){ showMsg('தேதியை தேர்ந்தெடுக்கவும்.','err'); return; }

  const btn = document.getElementById('loadBtn');
  btn.disabled = true; btn.textContent = 'ஏற்றுகிறது...';
  showMsg('📡 தரவு ஏற்றுகிறது...','info');

  try {
    const snap = await get(ref(db, `paper1_exam_tracking/${date}/students`));
    allStudents = [];
    if(snap.exists()){
      const data = snap.val();
      for(const id in data){
        const s = data[id];
        allStudents.push({
          name: s.studentName || 'மாணவர்',
          phone: s.phoneNumber || '-',
          category: s.category || '-',
          score: (s.score != null ? s.score : '-'),
          time: s.completedAt ? new Date(s.completedAt).toLocaleTimeString('ta-IN',{hour:'2-digit',minute:'2-digit'}) : '-'
        });
      }
    }
    document.getElementById('msg').style.display='none';
    document.getElementById('resultArea').classList.remove('hidden');
    renderStats();
    renderTable();
  } catch(e){
    showMsg('❌ பிழை: ' + e.message,'err');
  } finally {
    btn.disabled = false; btn.textContent = 'பார்க்க';
  }
};

function renderStats(){
  const total = allStudents.length;
  const scores = allStudents.map(s=>typeof s.score==='number'?s.score:0);
  const avg = total ? (scores.reduce((a,b)=>a+b,0)/total).toFixed(1) : 0;
  // pass = score >= 60% of 150 = 90 (rough; actual cutoff is community-based, kept simple here)
  const passN = allStudents.filter(s=>typeof s.score==='number' && s.score>=90).length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('passCount').textContent = passN;
  document.getElementById('avgScore').textContent = avg;
}

window.renderTable = function(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const filtered = allStudents.filter(s =>
    s.name.toLowerCase().includes(q) || String(s.phone).includes(q)
  );
  const body = document.getElementById('tableBody');
  const empty = document.getElementById('emptyMsg');
  const tableWrap = document.getElementById('tableWrap');
  if(allStudents.length === 0){
    tableWrap.style.display='none'; empty.classList.remove('hidden');
    return;
  }
  tableWrap.style.display='block'; empty.classList.add('hidden');
  body.innerHTML = filtered.map((s,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${esc(s.name)}</td>
      <td>${esc(String(s.phone))}</td>
      <td><span class="badge">${esc(s.category)}</span></td>
      <td><strong>${s.score}</strong></td>
      <td>${esc(s.time)}</td>
    </tr>`).join('');
};

function esc(t){ return String(t).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

window.exportCSV = function(){
  if(allStudents.length===0){ alert('தரவு இல்லை'); return; }
  const date = document.getElementById('trackDate').value;
  let csv = 'No,Name,Mobile,Community,Score,Time\n';
  allStudents.forEach((s,i)=>{
    csv += `${i+1},"${s.name}","${s.phone}","${s.category}",${s.score},"${s.time}"\n`;
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `tracking_${date}.csv`; a.click();
  URL.revokeObjectURL(url);
};
</script>
</body>
</html>
