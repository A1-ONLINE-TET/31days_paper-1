    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #d2ff08;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header { text-align: center; margin: 20px 0 30px; }
        .header h1 { font-size: 2rem; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-dim); font-size: 0.9rem; }

        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .settings-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .settings-group label { font-size: 0.85rem; color: var(--text-dim); }
        .settings-group input {
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px; border-radius: 10px; font-family: 'Inter', sans-serif;
        }
        .settings-group input:focus { outline: none; border-color: var(--accent-primary); }

        .voice-area { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px 0; }
        
        .action-buttons { display: flex; gap: 15px; align-items: center; margin-bottom: 10px; }
        
        .mic-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none; color: white; font-size: 30px; cursor: pointer;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .mic-btn.listening { animation: pulse 1.5s infinite; }
        
        .image-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-size: 24px; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .image-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        .preview-container {
            width: 100%; position: relative; display: none;
            margin-top: 10px; border-radius: 12px; overflow: hidden;
            border: 2px solid var(--accent-primary);
        }
        .preview-container img { width: 100%; display: block; }
        .remove-img {
            position: absolute; top: 10px; right: 10px;
            background: rgba(239, 68, 68, 0.8); border: none; color: white;
            width: 25px; height: 25px; border-radius: 50%; cursor: pointer;
        }

        .transcript-box {
            width: 100%; min-height: 100px; background: rgba(0,0,0,0.3);
            border-radius: 12px; padding: 15px; font-size: 1.1rem; color: #fff;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            font-family: 'Outfit', sans-serif; resize: vertical;
        }

        .action-btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: var(--success); color: white; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .action-btn:disabled { background: #475569; cursor: not-allowed; box-shadow: none; }

        .log-area {
            margin-top: 20px; font-family: 'Inter', monospace; font-size: 0.85rem;
            color: var(--text-dim); max-height: 200px; overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;
        }
        .log-entry { margin-bottom: 5px; line-height: 1.4; }
        .log-entry.success { color: var(--success); }
        .log-entry.error { color: var(--error); }
        .log-entry.ai { color: #a78bfa; }

        /* Preview Panel Styles */
        .preview-panel {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            display: none;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .preview-frame {
            width: 100%;
            height: 600px;
            border: 2px solid #eee;
            border-radius: 10px;
            background: #fff;
        }
        .live-badge {
            background: #ff4757;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

<body>

    <header class="header-standard">
        <a href="index.html" class="brand-container">
            <div class="brand-main">தமிழ் நண்பன்</div>
            <div class="brand-sub">COACHING CENTER</div>
        </a>
    </header>


    <div class="header">
        <h1>Tamil Nanban - Cloud Admin</h1>
        <p>100% Autonomous • Fix from Screenshots</p>
    </div>

    <div class="container">
        <div class="card">
            <div class="collapsible" onclick="toggleSettings()">⚙️ Settings (API Keys)</div>
            <div id="settings-panel" class="settings-group">
                <div>
                    <label>GitHub Username</label>
                    <input type="text" id="gh_user" value="A1-ONLINE-TET" style="width:100%">
                </div>
                <div>
                    <label>GitHub Repo</label>
                    <input type="text" id="gh_repo" value="2026-SPECIAL-EXAM" style="width:100%">
                </div>
                <div>
                    <label>GitHub Token (PAT)</label>
                    <input type="password" id="gh_token" placeholder="ghp_..." style="width:100%">
                </div>
                <div>
                    <label>Gemini API Key</label>
                    <input type="password" id="gemini_key" placeholder="AI Studio Key..." style="width:100%">
                    <div style="font-size:0.75rem; color:#94a3b8; margin-top:5px;">Get key from: aistudio.google.com</div>
                </div>
                <button onclick="saveSettings()" style="padding:10px; border-radius:8px; border:none; background:#3b82f6; color:white; margin-top:10px; cursor:pointer;">Save Settings</button>
            </div>

            <div class="voice-area">
                <div class="preview-container" id="preview-container">
                    <img id="image-preview" src="">
                    <button class="remove-img" onclick="removeImage()">✕</button>
                </div>
                
                <div class="action-buttons">
                    <button id="mic-btn" class="mic-btn" title="Click to speak">🎙️</button>
                    <label for="image-input" class="image-btn" title="Upload mistake screenshot">🖼️</label>
                    <input type="file" id="image-input" accept="image/*" style="display:none;" onchange="handleImageUpload(this)">
                </div>
                
                <textarea class="transcript-box" id="transcript" placeholder='Explain the fix or speak command...&#10;(e.g., "Change the incorrect date shown in this image")'></textarea>
            </div>

            <button id="run-btn" class="action-btn" disabled>✨ Fix & Push via AI</button>
            <div id="status" class="status"></div>
            <div id="loading" class="loading" style="display:none;">⏳ Processing... Please wait.</div>



            <div class="log-area" id="log"></div>
        </div>
    </div>

    <script>
        // Settings Management
        window.onload = () => {
            ['gh_user', 'gh_repo', 'gh_token', 'gemini_key'].forEach(id => {
                if(localStorage.getItem('cloud_'+id)) document.getElementById(id).value = localStorage.getItem('cloud_'+id);
            });
            if(!localStorage.getItem('cloud_gh_token') || !localStorage.getItem('cloud_gemini_key')) {
                document.getElementById('settings-panel').style.display = 'flex';
            }
        };

        function saveSettings() {
            ['gh_user', 'gh_repo', 'gh_token', 'gemini_key'].forEach(id => {
                localStorage.setItem('cloud_'+id, document.getElementById(id).value);
            });
            document.getElementById('settings-panel').style.display = 'none';
            log('Settings saved locally.', 'success');
        }

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        }

        function log(msg, type = '') {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div class="log-entry ${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // Image Handling
        let currentImageData = null;

        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('image-preview').src = e.target.result;
                    document.getElementById('preview-container').style.display = 'block';
                    currentImageData = {
                        type: file.type,
                        base64: e.target.result.split(',')[1]
                    };
                    checkCanRun();
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            document.getElementById('image-input').value = '';
            document.getElementById('preview-container').style.display = 'none';
            currentImageData = null;
            checkCanRun();
        }

        function checkCanRun() {
            const transcript = document.getElementById('transcript').value.trim();
            document.getElementById('run-btn').disabled = (transcript.length === 0 && !currentImageData);
        }

        // Voice Recognition
        const micBtn = document.getElementById('mic-btn');
        const transcriptBox = document.getElementById('transcript');
        const runBtn = document.getElementById('run-btn');
        let isListening = false;
        let manualStop = false;
        let accumulatedTranscript = '';
        let currentTranscriptText = '';
        let recognition;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ta-IN';

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                currentTranscriptText = '';
                if(!accumulatedTranscript) transcriptBox.placeholder = 'Listening...';
            };

            recognition.onresult = (event) => {
                let interim = '';
                currentTranscriptText = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) currentTranscriptText += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                const fullText = (accumulatedTranscript + " " + currentTranscriptText).trim();
                transcriptBox.value = fullText + (interim ? ' ' + interim : '');
                checkCanRun();
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('listening');
                accumulatedTranscript = (accumulatedTranscript + " " + currentTranscriptText).trim();
                currentTranscriptText = '';
                if(!manualStop) { try { recognition.start(); } catch(e){} }
                else if(!accumulatedTranscript) transcriptBox.placeholder = 'Explain the fix or speak command...';
            };
        }

        transcriptBox.addEventListener('input', checkCanRun);

        micBtn.onclick = () => { 
            if(isListening) { manualStop = true; recognition.stop(); }
            else { manualStop = false; recognition.start(); }
        };

        // Execution Logic
        runBtn.onclick = async () => {
            manualStop = true;
            if(isListening) recognition.stop();

            const ghUser = document.getElementById('gh_user').value.trim();
            const ghRepo = document.getElementById('gh_repo').value.trim();
            const ghToken = document.getElementById('gh_token').value.trim();
            const geminiKey = document.getElementById('gemini_key').value.trim();
            const command = transcriptBox.value.trim();

            if(!ghToken || !geminiKey) { alert("Configure GitHub and Gemini API."); toggleSettings(); return; }
            
            runBtn.disabled = true;
            runBtn.innerText = "🤖 AI fixing mistake...";
            document.getElementById('loading').style.display = 'block';
            log(`Instruction: "${command || 'Fix mistake in image'}"`);

            try {
                // 1. Get Repo Map
                log("Locating file in repository...");
                const mapRes = await fetch(`https://api.github.com/repos/${ghUser}/${ghRepo}/contents/PAPER 1/js/data/lessonMap.js`, {
                    headers: { 'Authorization': `token ${ghToken}` }
                });
                if(!mapRes.ok) throw new Error("Could not fetch map.");
                const mapData = await mapRes.json();
                let mapContent = decodeURIComponent(escape(atob(mapData.content)));
                
                const start = mapContent.indexOf('{');
                const end = mapContent.lastIndexOf('}');
                const mapObj = JSON.parse(mapContent.substring(start, end + 1));
                let fileList = [];
                for(let sub in mapObj) {
                    for(let key in mapObj[sub]) {
                        if(mapObj[sub][key].filename) {
                            fileList.push({ subject: sub, grade: mapObj[sub][key].grade, file: mapObj[sub][key].filename, title: mapObj[sub][key].title || "" });
                        }
                    }
                }

                // 2. AI Identification (Voice + Image)
                log("AI is analyzing image and instruction...", "ai");
                const prompt1 = `Instruction: "${command}"\nFiles: ${JSON.stringify(fileList.slice(0, 50))}\nAnalyze the instruction and the provided image (if any) to identify the target lesson file. Respond with ONLY JSON: {"file": "name", "subject": "sub", "grade": "num"}. If no image, rely on instruction.`;
                const aiRes1 = await callGemini(prompt1, geminiKey, currentImageData);
                
                let targetInfo;
                try {
                    targetInfo = JSON.parse(aiRes1.replace(/```json/g, '').replace(/```/g, '').trim());
                } catch(e) { throw new Error("AI failed to identify target file."); }

                if(!targetInfo.file || targetInfo.file === "unknown") throw new Error("Could not identify the lesson.");

                log(`Identified: ${targetInfo.file}.json`, "success");

                // 3. Fetch & Apply Fix
                const filePath = `PAPER 1/json-db/lessons/${targetInfo.subject}/${targetInfo.grade}/${targetInfo.file}.json`;
                const fileRes = await fetch(`https://api.github.com/repos/${ghUser}/${ghRepo}/contents/${filePath}`, {
                    headers: { 'Authorization': `token ${ghToken}` }
                });
                const fileData = await fileRes.json();
                const content = decodeURIComponent(escape(atob(fileData.content)));

                log("Applying corrections...", "ai");
                const prompt2 = `JSON Content:\n${content}\n\nTask: ${command}\nLook at the provided image. It shows a mistake or context for the requested change. Apply the fix to the JSON. Respond ONLY with raw updated JSON.`;
                let updatedJson = await callGemini(prompt2, geminiKey, currentImageData);
                updatedJson = updatedJson.replace(/```json/g, '').replace(/```/g, '').trim();

                // 4. Commit
                log("Pushing fix to GitHub...");
                const commitRes = await fetch(`https://api.github.com/repos/${ghUser}/${ghRepo}/contents/${filePath}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `🛠️ AI Visual Fix: ${command.substring(0, 50)}`,
                        content: btoa(unescape(encodeURIComponent(updatedJson))),
                        sha: fileData.sha
                    })
                });

                if(!commitRes.ok) throw new Error("Commit failed.");
                
                log("================================", "success");
                log("✅ Fix successfully deployed!", "success");
                log("================================", "success");
                

                removeImage();
                transcriptBox.value = "";
                accumulatedTranscript = "";

            } catch(e) {
                log(`Error: ${e.message}`, "error");
            } finally {
                runBtn.disabled = false;
                runBtn.innerText = "✨ Fix & Push via AI";
                document.getElementById('loading').style.display = 'none';
            }
        };

        async function callGemini(prompt, key, imageData = null) {
            try {
                let selectedModel = "gemini-1.5-flash"; 
                const parts = [{ text: prompt }];
                if(imageData) {
                    parts.push({ inline_data: { mime_type: imageData.type, data: imageData.base64 } });
                }

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: parts }], 
                        generationConfig: { 
                            temperature: 0.1,
                            topP: 0.95,
                            topK: 40
                        } 
                    })
                });
                
                const data = await res.json();
                if(data.error) throw new Error(data.error.message);
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                throw new Error("AI Call Failed: " + e.message);
            }
        }


    </script>
</body>
